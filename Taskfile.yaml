version: '3'

vars:
  YAML_CONFIG_FILES: "kubeconfig talosconfig"
  BINARY_FILES: ".env .envrc"

tasks:
  encrypt:all:
    desc: Encrypt all sensitive files in the current directory
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - task: encrypt:yaml
      - task: encrypt:yaml-configs
      - task: encrypt:binary

  encrypt:yaml:
    desc: Encrypt all YAML files to .enc.yaml versions
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        for file in *.yaml; do
          # Skip Taskfile.yaml
          if [[ "$file" == "Taskfile.yaml" ]] || [[ "$file" == "Taskfile.yml" ]]; then
            continue
          fi
          
          # Skip files that already have .enc. in the name
          if [[ "$file" == *.enc.* ]]; then
            continue
          fi
          
          if [ -f "$file" ]; then
            base="${file%.yaml}"
            enc_file="${base}.enc.yaml"
            
            if [ -f "$enc_file" ]; then
              echo "Encrypted version already exists: $enc_file, skipping..."
            else
              echo "Encrypting $file -> $enc_file"
              sops --encrypt "$file" > "$enc_file"
              rm "$file"
            fi
          fi
        done

  encrypt:yaml-configs:
    desc: Encrypt YAML config files without .yaml extension (kubeconfig, talosconfig)
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        for file in {{.YAML_CONFIG_FILES}}; do
          if [ -f "$file" ]; then
            if [[ "$file" == *.enc ]]; then
              echo "Skipping already encrypted file: $file"
              continue
            fi
            
            enc_file="${file}.enc"
            
            if [ -f "$enc_file" ]; then
              echo "Encrypted version already exists: $enc_file, skipping..."
            else
              echo "Encrypting $file -> $enc_file (as binary)"
              sops --encrypt --input-type binary --output-type binary "$file" > "$enc_file"
              rm "$file"
            fi
          fi
        done

  encrypt:binary:
    desc: Encrypt binary/non-YAML files to .enc versions
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        for file in {{.BINARY_FILES}}; do
          if [ -f "$file" ]; then
            if [[ "$file" == *.enc ]]; then
              echo "Skipping already encrypted file: $file"
              continue
            fi
            
            enc_file="${file}.enc"
            
            if [ -f "$enc_file" ]; then
              echo "Encrypted version already exists: $enc_file, skipping..."
            else
              echo "Encrypting $file -> $enc_file"
              sops --encrypt --input-type binary --output-type binary "$file" > "$enc_file"
              rm "$file"
            fi
          fi
        done

  decrypt:all:
    desc: Decrypt all .enc files to their original names and remove encrypted versions
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        # Decrypt YAML files
        for file in *.enc.yaml; do
          if [ -f "$file" ]; then
            if ! grep -q "sops:" "$file" 2>/dev/null; then
              echo "⚠ Skipping $file - not encrypted with SOPS"
              continue
            fi
            
            orig="${file%.enc.yaml}.yaml"
            echo "Decrypting $file -> $orig"
            sops --decrypt "$file" > "$orig"
            rm "$file"
          fi
        done
      - |
        # Decrypt YAML config files (kubeconfig, talosconfig)
        for file in {{.YAML_CONFIG_FILES}}; do
          enc_file="${file}.enc"
          if [ -f "$enc_file" ]; then
            echo "Decrypting $enc_file -> $file (as binary)"
            if sops --decrypt --input-type binary --output-type binary "$enc_file" > "$file" 2>/dev/null; then
              rm "$enc_file"
            else
              echo "⚠ Failed to decrypt $enc_file"
              rm "$file"  # Remove the potentially corrupted output
            fi
          fi
        done
      - |
        # Decrypt binary files
        find . -maxdepth 1 -name '*.enc' -type f | while read -r enc_file; do
          filename=$(basename "$enc_file" .enc)
          
          # Skip YAML configs (already handled)
          if [[ "$filename" == "kubeconfig" ]] || [[ "$filename" == "talosconfig" ]]; then
            continue
          fi
          
          orig="${enc_file%.enc}"
          echo "Decrypting $enc_file -> $orig (as binary)"
          if sops --decrypt --input-type binary --output-type binary "$enc_file" > "$orig" 2>/dev/null; then
            rm "$enc_file"
          else
            echo "⚠ Failed to decrypt $enc_file"
            rm "$orig"  # Remove the potentially corrupted output
          fi
        done

  status:
    desc: Check encryption status of files
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        echo "=== Encryption Status for $(pwd) ==="
        echo ""
        echo "Encrypted YAML Files:"
        for file in *.enc.yaml; do
          [ -f "$file" ] && echo "  ✓ $file"
        done
        echo ""
        echo "Encrypted Config/Binary Files:"
        for file in *.enc; do
          [ -f "$file" ] && echo "  ✓ $file"
        done
        echo ""
        echo "Unencrypted Files:"
        for file in *.yaml; do
          if [ -f "$file" ] && [[ "$file" != *.enc.yaml ]] && [[ "$file" != "Taskfile.yaml" ]]; then
            echo "  ✗ $file (no encrypted version)"
          fi
        done

  validate:
    desc: Validate that all .enc files can be decrypted
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - |
        echo "=== Validating Encrypted Files ==="
        failed=0

        for file in *.enc.yaml; do
          if [ -f "$file" ]; then
            if sops --decrypt "$file" > /dev/null 2>&1; then
              echo "  ✓ $file"
            else
              echo "  ✗ $file (failed to decrypt)"
              failed=1
            fi
          fi
        done

        for config in {{.YAML_CONFIG_FILES}}; do
          file="${config}.enc"
          if [ -f "$file" ]; then
            if sops --decrypt --input-type yaml --output-type yaml "$file" > /dev/null 2>&1; then
              echo "  ✓ $file [YAML]"
            else
              echo "  ✗ $file (failed to decrypt as YAML)"
              failed=1
            fi
          fi
        done

        for binary in {{.BINARY_FILES}}; do
          file="${binary}.enc"
          if [ -f "$file" ]; then
            if sops --decrypt --input-type binary --output-type binary "$file" > /dev/null 2>&1; then
              echo "  ✓ $file [BINARY]"
            else
              echo "  ✗ $file (failed to decrypt as binary)"
              failed=1
            fi
          fi
        done

        [ $failed -eq 1 ] && exit 1
        echo ""
        echo "All encrypted files validated successfully!"
