repos:
  # Community hooks for general hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '\.enc\.yaml$'
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: detect-private-key

  # Prevent secrets from being committed
  - repo: local
    hooks:
      - id: check-decrypted-files
        name: Block decrypted sensitive files
        entry: scripts/pre-commit-check-filenames.sh
        language: script
        always_run: true
        pass_filenames: false

      - id: check-sops-integrity
        name: Verify SOPS metadata in encrypted files
        entry: scripts/pre-commit-check-sops.sh
        language: script
        files: '\.(enc\.yaml|enc)$'
        pass_filenames: true

      - id: check-secret-patterns
        name: Scan for secret patterns in staged content
        entry: scripts/pre-commit-check-secrets.sh
        language: script
        always_run: true
        pass_filenames: false
