# Provides cluster specific configuration options.
cluster:
    # Globally unique identifier for this cluster (base64 encoded random 32 bytes).
    id: rjC5Ae8YqRQe6kYPcnVzPCGiUuAWQilfFZjnZtKjgBU=
    # Shared secret of cluster (base64 encoded random 32 bytes).
    secret: ENC[AES256_GCM,data:OkuNLMFH+n2BVV4a3FiptK/yPewd+2R2zbZzHtjmE9VQPPR2JsGiBiIA+E4=,iv:p5idmIDU0XMaRk4V/EHBmyZsnrYh9yMh/8C/Fsm4BJc=,tag:tGIAXX7hIlShLO1RVirt+g==,type:str]
    # Provides control plane specific configuration options.
    controlPlane:
        # Endpoint is the canonical controlplane endpoint, which can be an IP address or a DNS hostname.
        endpoint: ENC[AES256_GCM,data:u/jzQdBt/uxIYELlkM0JJkdCerO1tFNREi4=,iv:pQwrIalGnLaTvnsdOgOdl3h9QFaKHnO1lSWvepWNI1E=,tag:uMe/4FnWT+t+b76JZ7CRlA==,type:str]
    # Configures the cluster's name.
    clusterName: prod-proxmox-home-platform-cluster
    # Provides cluster specific network configuration options.
    network:
        # The domain used by Kubernetes DNS.
        dnsDomain: cluster.local
        # The pod subnet CIDR.
        podSubnets:
            - 10.244.0.0/16
        # The service subnet CIDR.
        serviceSubnets:
            - 10.96.0.0/12
            # # The CNI used.
            # cni:
            #     name: custom # Name of CNI to use.
            #     # URLs containing manifests to apply for the CNI.
            #     urls:
            #         - https://docs.projectcalico.org/archive/v3.20/manifests/canal.yaml
    # The [bootstrap token](https://kubernetes.io/docs/reference/access-authn-authz/bootstrap-tokens/) used to join the cluster.
    token: ENC[AES256_GCM,data:UXHS8r0NkLpPjv5YPntehB3guXFDDUg=,iv:NH4TFItjEkHHpyS5v1rsvadgS2dF9QVRxNjCHjAUR9A=,tag:ORj4mW4vByHCnJFx2ZSvIQ==,type:str]
    # A key used for the [encryption of secret data at rest](https://kubernetes.io/docs/tasks/administer-cluster/encrypt-data/).
    secretboxEncryptionSecret: HLR3MHGbPD3EHpmabvk+XGYambb+vFWo+Jdjsq9oKJU=
    # The base64 encoded root certificate authority used by Kubernetes.
    ca:
        crt: ENC[AES256_GCM,data:,iv:1hSTvYqJhWPt9A9H7HRoVI0sPvKCmJCCOsvCH6yrzRA=,tag:cNrJtO77vCOSRCRJqJcbUQ==,type:str]
        key: ENC[AES256_GCM,data:,iv:UDP5bR2RmakggNb2D92EzwV6vV9IhYsqXLHn8k26J80=,tag:9pLfct6nQYbC96CYJqwHlQ==,type:str]
    # The base64 encoded aggregator certificate authority used by Kubernetes for front-proxy certificate generation.
    aggregatorCA:
        crt: ENC[AES256_GCM,data:,iv:6AK/pztayei0mbR96IYczmKwbqHpswM5fRXlEdOTdCY=,tag:2W8XQ4DsmsrRwzB8kqdCIQ==,type:str]
        key: ENC[AES256_GCM,data:,iv:nPrUmWWKsp1gUfC8qfIWrCLjR6ux0rxH8UNHcaxT5YA=,tag:R41kqdRrR0W84icDyRj1fg==,type:str]
    # The base64 encoded private key for service account token generation.
    serviceAccount:
        key: ENC[AES256_GCM,data:,iv:ne/Yx5C/Rh+Q4iDHaocjM5qrCmjoW3k3N2kwAsD/uBA=,tag:rqmQeTmBz02MjhybOP21kw==,type:str]
    # API server specific configuration options.
    apiServer:
        # The container image used in the API server manifest.
        image: registry.k8s.io/kube-apiserver:v1.32.3
        # Extra certificate subject alternative names for the API server's certificate.
        certSANs:
            - ENC[AES256_GCM,data:rO8iVqr8RnamnXET/w==,iv:ZLR3125komPJ8wj9z7/6l9I0EXx3AWjSRRqM6F6wOQU=,tag:vBjjPvU0ezDo8MrpmKHeSA==,type:str]
        # Disable PodSecurityPolicy in the API server and default manifests.
        disablePodSecurityPolicy: true
        # Configure the API server admission plugins.
        admissionControl:
            # Name is the name of the admission controller.
            - name: PodSecurity
              # Configuration is an embedded configuration object to be used as the plugin's
              configuration:
                apiVersion: pod-security.admission.config.k8s.io/v1alpha1
                defaults:
                    audit: restricted
                    audit-version: latest
                    enforce: baseline
                    enforce-version: latest
                    warn: restricted
                    warn-version: latest
                exemptions:
                    namespaces:
                        - kube-system
                    runtimeClasses: []
                    usernames: []
                kind: PodSecurityConfiguration
        # Configure the API server audit policy.
        auditPolicy:
            apiVersion: audit.k8s.io/v1
            kind: Policy
            rules:
                - level: Metadata
                  # # Configure the API server authorization config. Node and RBAC authorizers are always added irrespective of the configuration.
                  # authorizationConfig:
