creation_rules:
  # Config files (kubeconfig, talosconfig) - encrypt sensitive keys
  - path_regex: (kubeconfig|talosconfig)$
    encrypted_regex: "^(certificate-authority-data|client-certificate-data|client-key-data|ca|crt|key)$"
    pgp: 46A08BAEF7DB948F66897A69C6D12C69DB830D3B

  # All YAML files - encrypt sensitive keys
  - path_regex: .*\.yaml$
    encrypted_regex: "^(ca|crt|id|secret|secretboxEncryptionSecret|token|bootstraptoken|key|environment|TS_AUTHKEY)$"
    pgp: 46A08BAEF7DB948F66897A69C6D12C69DB830D3B

  # Fallback for any other files
  - pgp: 46A08BAEF7DB948F66897A69C6D12C69DB830D3B
